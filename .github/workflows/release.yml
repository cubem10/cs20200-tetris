name: Build binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  DOTNET_VERSION: "10.x"
  PROJECT_PATH: src/Tetris.Console/Tetris.Console.fsproj
  TEST_PROJECT_PATH: tests/Tetris.Tests/Tetris.Tests.fsproj

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Run tests
        run: dotnet run --project "$TEST_PROJECT_PATH"

  publish:
    name: Publish ${{ matrix.target }}
    needs: test
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            rid: linux-x64
            executable: Tetris.Console
            archive: cs20200-tetris-linux-x64.tar.gz
          - target: osx-arm64
            rid: osx-arm64
            executable: Tetris.Console
            archive: cs20200-tetris-osx-arm64.tar.gz
          - target: win-x64
            rid: win-x64
            executable: Tetris.Console.exe
            archive: cs20200-tetris-win-x64.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore ${{ matrix.target }}
        run: dotnet restore "$PROJECT_PATH" -r "${{ matrix.rid }}"

      - name: Publish ${{ matrix.target }}
        shell: bash
        run: |
          publish_dir="${RUNNER_TEMP}/publish/${{ matrix.target }}"

          dotnet publish "$PROJECT_PATH" \
            -c Release \
            -r "${{ matrix.rid }}" \
            --self-contained true \
            --no-restore \
            -o "$publish_dir" \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:EnableCompressionInSingleFile=true \
            -p:DebugType=None \
            -p:DebugSymbols=false

      - name: Package ${{ matrix.target }}
        shell: bash
        run: |
          publish_dir="${RUNNER_TEMP}/publish/${{ matrix.target }}"
          archive_path="${GITHUB_WORKSPACE}/dist/${{ matrix.archive }}"

          mkdir -p "$(dirname "$archive_path")"

          if [[ "${{ matrix.rid }}" == win-* ]]; then
            (cd "$publish_dir" && zip -9 -r "$archive_path" .)
          else
            chmod +x "$publish_dir/${{ matrix.executable }}"
            (cd "$publish_dir" && tar -czf "$archive_path" .)
          fi

      - name: Upload ${{ matrix.target }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Create GitHub release
    needs: publish
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download binaries
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --generate-notes